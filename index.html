<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#b71c1c,#d32f2f);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

.login-box img{
    width:120px;
    height:120px;
    margin-bottom:15px;
}

.login-box h2{
    color:#b71c1c;
    margin-bottom:5px;
}

.login-box p{
    color:#666;
    margin-bottom:20px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#b71c1c;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8b0000;
}

.links{
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#b71c1c;
    font-size:14px;
}

.footer{
    margin-top:20px;
    color:#555;
    font-size:13px;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="logo.png" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <p>Melmaruvathur</p>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="#">Forgot Password?</a><br><br>
        <a href="#">Create New Account</a>
    </div>

    <div class="footer">
        <p><b>Study | Spirituality | Service</b></p>
    </div>

</div>

</body>
</html>
