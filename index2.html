<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Box</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{
    width:300px;
    padding:12px;
    font-size:16px;
    border-radius:25px;
    border:2px solid #007BFF;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Search Box</h2>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<input
type="text"
name="Search"
placeholder="Enter anything..."
required>

<!-- Disable Captcha -->
<input type="hidden" name="_captcha" value="false">

<!-- Thank You Page -->
<input type="hidden" name="_next" value="https://YOUR_USERNAME.github.io/YOUR_REPOSITORY/thankyou.html">

<button type="submit">
Search
</button>

</form>

</div>

</body>
</html>
